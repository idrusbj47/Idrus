<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumen AD/ART Warga</title>
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1A202C;
            color: #E2E8F0;
            font-family: 'Quattrocento Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }
        h1 {
            color: #38B2AC;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #A0AEC0;
            margin-top: 0;
        }
        .document-container {
            width: 100%;
            max-width: 800px;
            background: #2D3748;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }
        iframe {
            width: 100%;
            height: 75vh; /* Mengisi 75% tinggi layar */
            border: none;
            border-radius: 4px;
            background-color: #ffffff;
        }
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #38B2AC;
            color: #1A202C;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .download-btn:hover {
            background-color: #288f8a;
        }
        
        /* Penyesuaian untuk layar HP kecil */
        @media (max-width: 600px) {
            iframe {
                height: 60vh; 
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>AD/ART Lingkungan</h1>
        <p class="subtitle">Anggaran Dasar dan Anggaran Rumah Tangga</p>
    </header>

    <div class="document-container">
        <iframe src="ad-art.pdf" title="Dokumen AD ART">
            <p>Browser Anda tidak mendukung tampilan PDF langsung.</p>
        </iframe>
    </div>

    <div class="actions">
        <a href="ad-art.pdf" class="download-btn" download>Unduh Dokumen PDF</a>
    </div>

</body>
</html>
